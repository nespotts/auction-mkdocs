site_name: Whalen Sawmill Equipment Auction — Resale Analysis
site_description: >-
  Facebook Marketplace resale values, sales comps, new-cost references, and
  estimated auction hammer prices for the Whalen Realty Sawmill Equipment
  Auction (formerly Glen Garbers Sawmill) — Wauseon, OH, June 13, 2026.

# GitHub Pages URL (used for canonical links, the sitemap, and instant navigation).
# If you fork/rename the repo, update this to https://<user>.github.io/<repo>/
site_url: https://nespotts.github.io/auction-mkdocs/

# Adds a GitHub repo link in the header.
repo_url: https://github.com/nespotts/auction-mkdocs
repo_name: nespotts/auction-mkdocs

theme:
  name: material
  icon:
    logo: material/saw-blade
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search

nav:
  - Overview & Summary: index.md
  - "Core Sawmill — Lots 1–4": details-1-sawmill.md
  - "Wood Shop — Lots 5–9, 15, 18–24, 26": details-2-woodshop.md
  - "Specialty Machines — Lots 11–14, 16–17, 27": details-3-specialty.md
  - "Handling & Tanks — Lots 10, 25, 28–34": details-4-handling.md
  - "Tractors & Chipper — Lots 35–38": details-5-tractors.md
  - "Containers, Trailers & Forestry — Lots 39–44": details-6-trailers.md
  - "Ring 2 — Pole-Barn Items": ring2.md
  - "Bidding & Methodology": bidding.md

copyright: >-
  Estimates only — for personal bidding research. Prices reflect the U.S. market
  as of June 2026 and are not guaranteed.
